version: '3.8'

services:
  db:
    image: postgres:15
    container_name: sql-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      # Set default database to 'postgres' since we are creating others via script
      POSTGRES_DB: postgres 
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      # NEW: Map the init-scripts folder to populate Sakila and Example DBs
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - sql-sandbox-net
    healthcheck:
      # Updated to check the 'postgres' database
      test: ["CMD-SHELL", "pg_isready -U admin -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  gui:
    image: dpage/pgadmin4
    container_name: sql-gui
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - sql-sandbox-net
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg-data:

networks:
  sql-sandbox-net:
    name: sql-sandbox-net
